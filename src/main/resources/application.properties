# Oracle GoldenGate Data Stream WebSocket URL
# Override using environment variable OGG_STREAM_URL or JVM argument -Dogg.stream.url=...
ogg.stream.url=ws://192.168.56.161:7803/services/v2/stream/oggstream?begin=now

# Credentials should be supplied using environment variables in real usage:
# OGG_USER and OGG_PASSWORD
ogg.username=oggadmin
ogg.password=change-me

# Reconnect settings
ogg.reconnect.enabled=true
ogg.reconnect.max-attempts=10
ogg.reconnect.initial-delay-ms=3000
ogg.reconnect.max-delay-ms=30000
